name: validation-solo

# Backup validation account: when an administrator applies the
# "validation-solo" label to a PR, the github-actions bot approves it.
# Only to be used when no other developer is available - applying the
# label is the act of validation, traced in the PR history.

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  approve:
    if: github.event.label.name == 'validation-solo'
    runs-on: ubuntu-latest
    steps:
      - name: Approve the PR (backup validation)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh pr review "${{ github.event.pull_request.number }}"
          --approve --repo "${{ github.repository }}"
          --body "Backup validation triggered by the validation-solo
          label (applied by an administrator)."
