name: tests

on:
  push:
  pull_request:

jobs:
  test:
    # Windows: environment identical to prod (MetaTrader5 is Windows-only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Line-count guard (warns > 600, fails > 700)
        shell: python
        run: |
          import os, pathlib, sys
          warnings, failed = [], False
          for p in sorted(pathlib.Path(".").rglob("*.py")):
              n = sum(1 for _ in p.open(encoding="utf-8", errors="ignore"))
              if n > 700:
                  print(f"::error file={p}::{p} is {n} lines (> 700): refactoring required")
                  failed = True
              elif n > 600:
                  print(f"::warning file={p}::{p} is {n} lines (> 600): plan a reduction")
                  warnings.append(f"{p}: {n} lines")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write("LONG_FILES=" + " | ".join(warnings) + "\n")
          sys.exit(1 if failed else 0)
      - name: Telegram alert for long files (if secrets configured)
        # Project rule: 600-700 lines -> Telegram notification with a
        # warning sign. Silent if the secrets are not defined.
        if: env.LONG_FILES != '' && github.ref == 'refs/heads/master'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os, urllib.parse, urllib.request
          token, chat = os.environ.get("TG_TOKEN"), os.environ.get("TG_CHAT")
          if not token or not chat:
              print("Telegram secrets missing: CI annotation only.")
              raise SystemExit(0)
          text = ("⚠️ Files above 600 lines: "
                  + os.environ["LONG_FILES"])
          data = urllib.parse.urlencode(
              {"chat_id": chat, "text": text}).encode()
          urllib.request.urlopen(
              f"https://api.telegram.org/bot{token}/sendMessage", data)
      - name: Test suites (MT5 and yfinance mocked)
        run: python -m unittest discover -s tests -v
